<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Slewing Gear Motor Calculator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- KaTeX 0.16 — renders the django-latexify spans -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <style>
    body { background: #f0f2f5; font-size: 0.88rem; }
    .navbar-brand { font-weight: 700; letter-spacing: .03em; }
    .card { border: none; border-radius: .6rem; }
    .card-header { border-radius: .6rem .6rem 0 0 !important; font-weight: 600; }
    .section-label {
      font-size: .70rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: #6c757d; margin: 1rem 0 .4rem;
    }
    .result-row td { padding: .3rem .5rem; }
    .result-row td:first-child { color: #495057; }
    .result-row td:last-child { font-weight: 600; font-family: monospace; font-size: .9rem; }
    .badge-ok      { background: #198754; }
    .badge-marginal{ background: #fd7e14; }
    .badge-fail    { background: #dc3545; }
    .step-badge {
      display: inline-block; width: 22px; height: 22px; border-radius: 50%;
      background: #0d6efd; color: #fff; font-size: .72rem; font-weight: 700;
      text-align: center; line-height: 22px; margin-right: .4rem;
    }
    .supplier-check-row td { padding: .25rem .5rem; }
    .overall-badge { font-size: 1.1rem; padding: .4rem 1rem; }

    /* Formula cards */
    .formula-card { background: #fff; border: 1px solid #dee2e6; border-radius: .5rem; height: 100%; }
    .formula-card .formula-body { padding: .75rem 1rem; }
    .formula-display {
      background: #f8f9fa; border-radius: .35rem;
      padding: .6rem .5rem; margin: .5rem 0;
      text-align: center; overflow-x: auto;
      border-left: 3px solid #0d6efd;
    }
    .formula-vars { font-size: .78rem; color: #495057; line-height: 1.7; }
    .formula-vars code { background: #e9ecef; padding: 0 .25rem; border-radius: .2rem; }
    .formula-note { font-size: .76rem; color: #6c757d; margin-top: .4rem; }

    /* KaTeX block override: keep centred but don't add huge vertical margin */
    .django-latexify.math.block .katex-display { margin: 0; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3 py-2 mb-3">
  <span class="navbar-brand">
    <i class="bi bi-gear-wide-connected me-2"></i>Slewing Gear Motor Calculator
  </span>
  <span class="text-secondary small">Motor → Bevel Gearbox → Worm Gear → Slewing Ring</span>
</nav>

<div class="container-fluid px-3">
  {% block content %}{% endblock %}
</div>

<footer class="text-center text-muted py-3 mt-4 small">
  Palfinger Marine — BU Wind | Drivetrain Sizing Tool
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- KaTeX JS — must come after content so spans exist in DOM -->
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var opts = { throwOnError: false, errorColor: '#dc3545' };

    // Render block (display) formulas written by django-latexify
    document.querySelectorAll('.django-latexify.math.block').forEach(function (el) {
      katex.render(el.textContent, el, Object.assign({}, opts, { displayMode: true }));
    });

    // Render inline formulas written by django-latexify
    document.querySelectorAll('.django-latexify.math.inline').forEach(function (el) {
      katex.render(el.textContent, el, Object.assign({}, opts, { displayMode: false }));
    });
  });
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
